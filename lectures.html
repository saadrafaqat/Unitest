<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/protection.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="images/nustology.jpg">
    <meta name="theme-color" content="#1a56db">
    <title>Video Lectures - NUSTology Prep.</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a56db; --primary-dark: #1e3a8a; --primary-bg: #eff6ff;
            --dark: #0f172a; --gray: #64748b; --gray-lighter: #e2e8f0;
            --white: #fff; --bg: #f8fafc; --border: #e2e8f0;
            --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
            --radius: 10px; --radius-lg: 14px;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; font-size: 15px; }
        .layout { display: flex; min-height: 100vh; }

        /* Sidebar & Topbar */
        .sidebar { width: 250px; background: #fff; border-right: 1px solid var(--border); padding: 20px 14px; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100; transition: transform 0.25s ease; }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 10px 18px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .sidebar-logo img { width: 34px; height: 34px; border-radius: 8px; object-fit: cover; }
        .sidebar-logo .text { font-size: 16px; font-weight: 700; line-height: 1.2; }
        .sidebar-logo .nust { color: var(--primary); }
        .sidebar-logo .prep { color: var(--gray); font-weight: 400; font-size: 12px; display: block; }
        
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 2px; }
        .menu-section { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; padding: 14px 12px 6px; }
        .menu-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 8px; color: var(--gray); text-decoration: none; font-size: 14px; font-weight: 500; min-height: 40px; transition: background 0.2s, color 0.2s; }
        .menu-item svg { width: 18px; height: 18px; flex-shrink: 0; }
        .menu-item:hover { background: var(--primary-bg); color: var(--primary); }
        .menu-item.active { background: var(--primary); color: #fff; }

        .main { flex: 1; margin-left: 250px; min-height: 100vh; padding-bottom: 70px; }
        .topbar { background: #fff; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; min-height: 60px; }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar h1 { font-size: 18px; font-weight: 700; }
        .topbar p { font-size: 12px; color: var(--gray); }
        .mobile-toggle { display: none; background: var(--gray-lighter); border: none; padding: 8px; border-radius: 8px; cursor: pointer; }
        .logout-btn { background: var(--gray-lighter); border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--dark); }
        .logout-btn:hover { background: var(--danger); color: #fff; }

        /* Content & Grid */
        .content { padding: 20px; max-width: 1100px; margin: 0 auto; }
        .filter-bar { background: white; padding: 12px 16px; border-radius: var(--radius); margin-bottom: 16px; border: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }
        .filter-bar select { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; }
        
        .lectures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .lecture-card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; transition: 0.3s; cursor: pointer; }
        .lecture-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .thumb { position: relative; aspect-ratio: 16/9; background: #eee; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s; }
        .lecture-card:hover .play-overlay { opacity: 1; }
        .play-btn { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .duration-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .difficulty-badge { position: absolute; top: 10px; left: 10px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: white; }
        .difficulty-badge.easy { background: var(--success); }
        .difficulty-badge.medium { background: var(--warning); }
        .difficulty-badge.hard { background: var(--danger); }
        
        .lecture-info { padding: 16px; }
        .subject-tag { display: inline-block; padding: 2px 8px; background: var(--primary-bg); color: var(--primary); border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .lecture-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .lecture-instructor { font-size: 12px; color: var(--gray); display: flex; align-items: center; gap: 6px; }

        /* Modal */
        .video-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .video-modal.show { display: flex; }
        .video-modal-content { max-width: 900px; width: 100%; background: #000; border-radius: 12px; overflow: hidden; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .mobile-toggle { display: flex; }
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="images/nustology.jpg" alt="" onerror="this.style.display='none'">
            <div class="text"><span class="nust">NUST</span>ology <span class="prep">Prep.</span></div>
        </div>
        <ul class="sidebar-menu">
            <div class="menu-section">Main</div>
            <li><a href="student.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a></li>
            <li><a href="test.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Take Test</a></li>
            <li><a href="leaderboard.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Leaderboard</a></li>
            <div class="menu-section">Learn</div>
            <li><a href="lectures.html" class="menu-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>Video Lectures</a></li>
            <li><a href="aggregate.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>Aggregate Calculator</a></li>
            <li><a href="faq.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>FAQs</a></li>
        </ul>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="topbar-left">
                <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div>
                    <h1>Video Lectures</h1>
                    <p>Watch curated lectures for every NET topic</p>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="content">
            <div class="filter-bar">
                <select id="fieldFilter" onchange="loadLectures()">
                    <option value="all">All Fields</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Medical">Medical</option>
                </select>
                <select id="subjectFilter" onchange="loadLectures()">
                    <option value="all">All Subjects</option>
                    <option value="Physics">Physics</option>
                    <option value="Mathematics">Mathematics</option>
                </select>
            </div>
            <div id="lecturesContainer" class="lectures-grid"></div>
        </div>
    </main>
</div>

<div class="video-modal" id="videoModal">
    <div class="video-modal-content">
        <div style="padding: 10px 20px; display: flex; justify-content: space-between; align-items:center; color:white;">
            <h3 id="videoTitle" style="font-size:14px;"></h3>
            <button class="logout-btn" onclick="closeVideo()">Close</button>
        </div>
        <div style="position:relative; padding-bottom:56.25%; height:0;">
            <iframe id="videoFrame" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';

    function getYouTubeId(url) {
        const m = (url || '').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([^&\n?#]+)/);
        return m ? m[1] : null;
    }

    async function loadLectures() {
        const token = localStorage.getItem('nustology_token');
        const field = document.getElementById('fieldFilter').value;
        const subject = document.getElementById('subjectFilter').value;
        try {
            const res = await fetch(`${API_BASE}/lectures?field=${field}&subject=${subject}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            renderLectures(data.lectures || []);
        } catch (e) {
            document.getElementById('lecturesContainer').innerHTML = '<p>Failed to load.</p>';
        }
    }

    function renderLectures(lectures) {
        const container = document.getElementById('lecturesContainer');
        if (!lectures.length) {
            container.innerHTML = '<p style="color:var(--gray)">No lectures found.</p>';
            return;
        }
        container.innerHTML = lectures.map(l => {
            const videoId = getYouTubeId(l.youtube_url);
            const thumb = l.thumbnail || (videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : '');
            return `<div class="lecture-card" onclick="playVideo('${videoId}', '${l.title.replace(/'/g, "\\'")}')">
                <div class="thumb">
                    <img src="${thumb}" onerror="this.src=''">
                    ${l.difficulty ? `<span class="difficulty-badge ${l.difficulty.toLowerCase()}">${l.difficulty}</span>` : ''}
                    ${l.duration ? `<span class="duration-badge">${l.duration}</span>` : ''}
                    <div class="play-overlay"><div class="play-btn">▶</div></div>
                </div>
                <div class="lecture-info">
                    <span class="subject-tag">${l.subject}</span>
                    <div class="lecture-title">${l.title}</div>
                    <div class="lecture-instructor">Instructor: ${l.instructor || 'N/A'}</div>
                </div>
            </div>`;
        }).join('');
    }

    function playVideo(id, title) {
        document.getElementById('videoTitle').textContent = title;
        document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.getElementById('videoModal').classList.add('show');
    }

    function closeVideo() {
        document.getElementById('videoFrame').src = '';
        document.getElementById('videoModal').classList.remove('show');
    }

    async function logout() {
        if(!confirm('Logout?')) return;
        localStorage.clear();
        window.location.href = '/index.html';
    }

    loadLectures();
</script>
</body>
</html>
