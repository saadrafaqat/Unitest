<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - NUSTology Prep.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a56db; --primary-dark: #1e3a8a; --primary-bg: #eff6ff;
            --dark: #0f172a; --gray: #64748b; --gray-lighter: #e2e8f0;
            --white: #fff; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
            --gold: #fbbf24; --silver: #94a3b8; --bronze: #d97706;
        }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: var(--dark); min-height: 100vh; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: white; border-right: 1px solid var(--gray-lighter);
            padding: 24px 16px; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 12px 24px; border-bottom: 1px solid var(--gray-lighter); margin-bottom: 20px;
        }
        .sidebar-logo img { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; }
        .sidebar-logo .text { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
        .sidebar-logo .nust { color: var(--primary); }
        .sidebar-logo .prep { color: var(--gray); font-weight: 400; font-size: 14px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .menu-section { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; padding: 16px 12px 8px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: var(--gray); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.3s; }
        .menu-item svg { width: 18px; height: 18px; }
        .menu-item:hover { background: var(--primary-bg); color: var(--primary); }
        .menu-item.active { background: var(--primary); color: white; }
        .main { flex: 1; margin-left: 260px; min-height: 100vh; }
        .topbar { background: white; padding: 16px 32px; border-bottom: 1px solid var(--gray-lighter); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        .topbar h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
        .topbar p { font-size: 13px; color: var(--gray); margin-top: 2px; }
        .logout-btn { background: var(--gray-lighter); border: none; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--dark); font-family: inherit; }
        .logout-btn:hover { background: var(--danger); color: white; }
        .content { padding: 32px; max-width: 1100px; margin: 0 auto; }

        .tabs {
            display: flex; gap: 4px; background: white; padding: 6px;
            border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--gray-lighter); overflow-x: auto;
        }
        .tab-btn { padding: 10px 18px; background: transparent; border: none; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--gray); transition: all 0.2s; white-space: nowrap; }
        .tab-btn:hover { background: var(--primary-bg); color: var(--primary); }
        .tab-btn.active { background: var(--primary); color: white; }

        .filter-bar {
            background: white; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px;
            border: 1px solid var(--gray-lighter); display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .filter-bar label { font-size: 13px; font-weight: 600; }
        .filter-bar select {
            padding: 8px 14px; border: 1.5px solid var(--gray-lighter); border-radius: 8px;
            font-family: inherit; font-size: 14px; cursor: pointer;
        }
        .filter-bar select:focus { outline: none; border-color: var(--primary); }

        .podium {
            display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 16px;
            margin-bottom: 30px; align-items: end;
        }
        .podium-card {
            background: white; border-radius: 16px; padding: 24px 18px;
            text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06); position: relative;
        }
        .podium-card .crown { font-size: 28px; margin-bottom: 8px; }
        .podium-card .rank-num { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 4px; }
        .podium-card.first {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            transform: translateY(-15px); border: 3px solid var(--gold);
        }
        .podium-card.first .rank-num { color: #92400e; }
        .podium-card.second { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); border: 3px solid var(--silver); }
        .podium-card.second .rank-num { color: var(--gray); }
        .podium-card.third { background: linear-gradient(135deg, #fed7aa, #fdba74); border: 3px solid var(--bronze); }
        .podium-card.third .rank-num { color: #92400e; }
        .podium-avatar {
            width: 70px; height: 70px; border-radius: 50%; background: white; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            font-size: 26px; color: var(--primary); overflow: hidden; border: 3px solid white;
        }
        .podium-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .podium-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .podium-field { font-size: 11px; color: var(--gray); margin-bottom: 8px; }
        .podium-score { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--primary); }

        .leaderboard-table {
            background: white; border-radius: 14px; overflow: hidden; border: 1px solid var(--gray-lighter);
        }
        .table-row {
            display: grid; grid-template-columns: 60px 1fr 120px 100px 100px;
            gap: 16px; padding: 14px 20px; align-items: center;
            border-bottom: 1px solid var(--gray-lighter); transition: all 0.2s;
        }
        .table-row:hover { background: #f8fafc; }
        .table-row.header { background: #f8fafc; font-weight: 700; color: var(--gray); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .rank-badge {
            width: 32px; height: 32px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 700; font-size: 13px;
            background: var(--primary-bg); color: var(--primary);
        }
        .rank-badge.gold { background: var(--gold); color: white; }
        .rank-badge.silver { background: var(--silver); color: white; }
        .rank-badge.bronze { background: var(--bronze); color: white; }
        .user-cell { display: flex; align-items: center; gap: 12px; }
        .user-avatar-sm {
            width: 36px; height: 36px; border-radius: 50%; background: var(--primary-bg);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; overflow: hidden;
        }
        .user-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-username { font-size: 12px; color: var(--gray); }
        .field-pill { display: inline-block; padding: 3px 10px; background: var(--primary-bg); color: var(--primary); border-radius: 20px; font-size: 11px; font-weight: 600; }
        .score-display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: var(--success); font-size: 16px; }
        .perc-display { color: var(--primary); font-weight: 600; }

        .empty { text-align: center; padding: 60px 20px; color: var(--gray); }
        .empty svg { width: 60px; height: 60px; opacity: 0.3; margin-bottom: 12px; }

        .mobile-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }

        @media (max-width: 1024px) {
            .podium { grid-template-columns: 1fr; }
            .podium-card.first { transform: none; }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .mobile-toggle { display: block; }
            .content { padding: 20px; }
            .table-row { grid-template-columns: 50px 1fr 80px; gap: 10px; padding: 12px; }
            .table-row .field-col, .table-row .perc-col { display: none; }
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="images/nustology.jpg" alt="" onerror="this.style.display='none'">
            <div class="text"><span class="nust">NUST</span>ology <div class="prep">Prep.</div></div>
        </div>
        <ul class="sidebar-menu">
            <div class="menu-section">Main</div>
            <li><a href="student.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a></li>
            <li><a href="test.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Take Test</a></li>
            <li><a href="leaderboard.html" class="menu-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Leaderboard</a></li>
            <div class="menu-section">Learn</div>
            <li><a href="lectures.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>Video Lectures</a></li>
            <li><a href="aggregate.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>Aggregate Calculator</a></li>
            <li><a href="merit.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Past Merit Lists</a></li>
            <li><a href="faq.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>FAQs</a></li>
            <div class="menu-section">Community</div>
            <li><a href="chat.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a></li>
            <li><a href="community.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Community</a></li>
            <div class="menu-section">Account</div>
            <li><a href="profile.html" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a></li>
        </ul>
    </aside>

    <main class="main">
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div>
                    <h1>Leaderboard</h1>
                    <p>See top performers across the platform</p>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('score', this)">Top Scorers</button>
                <button class="tab-btn" onclick="switchTab('streak', this)">Streak Masters</button>
            </div>

            <div id="tab-score">
                <div class="filter-bar">
                    <label>Filter by Field:</label>
                    <select id="fieldFilter" onchange="loadLeaderboard()">
                        <option value="all">All Fields</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Medical">Medical</option>
                        <option value="Business">Business</option>
                        <option value="Architecture">Architecture</option>
                    </select>
                </div>

                <div id="podiumContainer"></div>
                <div id="leaderboardContainer" class="leaderboard-table"></div>
            </div>

            <div id="tab-streak" style="display:none;">
                <div class="leaderboard-table" id="streakContainer"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const API_BASE = '/api';

    function switchTab(tab, btn) {
        document.getElementById('tab-score').style.display = tab === 'score' ? 'block' : 'none';
        document.getElementById('tab-streak').style.display = tab === 'streak' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (tab === 'streak') loadStreaks();
    }

    async function checkAuth() {
        const token = localStorage.getItem('nustology_token');
        if (!token) { window.location.href = '/index.html'; return; }
    }

    async function loadLeaderboard() {
        const token = localStorage.getItem('nustology_token');
        const field = document.getElementById('fieldFilter').value;
        try {
            const res = await fetch(`${API_BASE}/leaderboard?field=${field}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) renderLeaderboard(data.leaderboard);
        } catch (e) {
            document.getElementById('leaderboardContainer').innerHTML = '<div class="empty">Failed to load</div>';
        }
    }

    function renderLeaderboard(list) {
        const podium = document.getElementById('podiumContainer');
        const container = document.getElementById('leaderboardContainer');

        if (!list.length) {
            podium.innerHTML = '';
            container.innerHTML = `<div class="empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <p>No leaderboard data yet. Take a test to appear here!</p>
            </div>`;
            return;
        }

        // Top 3 podium
        if (list.length >= 3) {
            podium.innerHTML = `
                <div class="podium">
                    ${renderPodiumCard(list[1], 2, 'second')}
                    ${renderPodiumCard(list[0], 1, 'first')}
                    ${renderPodiumCard(list[2], 3, 'third')}
                </div>`;
        } else {
            podium.innerHTML = '';
        }

        // Full table
        let html = `<div class="table-row header">
            <div>Rank</div>
            <div>Student</div>
            <div class="field-col">Field</div>
            <div>Score</div>
            <div class="perc-col">%</div>
        </div>`;
        
        list.forEach((s, i) => {
            const rank = i + 1;
            let badgeClass = '';
            if (rank === 1) badgeClass = 'gold';
            else if (rank === 2) badgeClass = 'silver';
            else if (rank === 3) badgeClass = 'bronze';

            const name = s.full_name || s.username;
            const initial = name[0].toUpperCase();
            const avatar = s.profile_picture ? `<img src="${s.profile_picture}">` : initial;

            html += `<div class="table-row">
                <div><div class="rank-badge ${badgeClass}">${rank}</div></div>
                <div class="user-cell">
                    <div class="user-avatar-sm">${avatar}</div>
                    <div>
                        <div class="user-name">${name}</div>
                        <div class="user-username">@${s.username}</div>
                    </div>
                </div>
                <div class="field-col"><span class="field-pill">${s.field || '-'}</span></div>
                <div><span class="score-display">${(s.best_score || 0).toFixed(1)}</span></div>
                <div class="perc-col"><span class="perc-display">${(s.best_percentage || 0).toFixed(1)}%</span></div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderPodiumCard(student, rank, position) {
        const name = student.full_name || student.username;
        const initial = name[0].toUpperCase();
        const avatar = student.profile_picture ? `<img src="${student.profile_picture}">` : initial;
        return `<div class="podium-card ${position}">
            <div class="rank-num">#${rank}</div>
            <div class="podium-avatar">${avatar}</div>
            <div class="podium-name">${name}</div>
            <div class="podium-field">${student.field || '-'}</div>
            <div class="podium-score">${(student.best_score || 0).toFixed(1)}</div>
        </div>`;
    }

    async function loadStreaks() {
        const token = localStorage.getItem('nustology_token');
        try {
            const res = await fetch(`${API_BASE}/leaderboard/streaks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const container = document.getElementById('streakContainer');
            if (!data.success || !data.streaks.length) {
                container.innerHTML = `<div class="empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <p>No streaks yet. Answer questions correctly in a row to appear here!</p>
                </div>`;
                return;
            }

            let html = `<div class="table-row header">
                <div>Rank</div>
                <div>Student</div>
                <div class="field-col">Field</div>
                <div>Streak</div>
                <div class="perc-col"></div>
            </div>`;

            data.streaks.forEach((s, i) => {
                const rank = i + 1;
                let badgeClass = '';
                if (rank === 1) badgeClass = 'gold';
                else if (rank === 2) badgeClass = 'silver';
                else if (rank === 3) badgeClass = 'bronze';
                const name = s.full_name || s.username;
                const initial = name[0].toUpperCase();
                const avatar = s.profile_picture ? `<img src="${s.profile_picture}">` : initial;

                html += `<div class="table-row">
                    <div><div class="rank-badge ${badgeClass}">${rank}</div></div>
                    <div class="user-cell">
                        <div class="user-avatar-sm">${avatar}</div>
                        <div>
                            <div class="user-name">${name}</div>
                            <div class="user-username">@${s.username}</div>
                        </div>
                    </div>
                    <div class="field-col"><span class="field-pill">${s.field || '-'}</span></div>
                    <div><span class="score-display" style="color:var(--warning);">${s.best_streak} 🔥</span></div>
                    <div class="perc-col"></div>
                </div>`;
            });
            container.innerHTML = html;
        } catch (e) {}
    }

    async function logout() {
        const token = localStorage.getItem('nustology_token');
        try { await fetch(`${API_BASE}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); } catch(e){}
        localStorage.clear();
        window.location.href = '/index.html';
    }

    checkAuth();
    loadLeaderboard();
</script>
</body>
</html>
